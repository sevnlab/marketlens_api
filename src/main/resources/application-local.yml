# =====================================================
# 로컬 개발 환경 설정 (application-local.yml)
# Redis/Kafka/Oracle 없이 실행 가능, H2 인메모리 DB 사용
#
# 실행 방법 (IntelliJ):
#   Run Configuration -> Active profiles -> "local" 입력
# =====================================================

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
      - org.redisson.spring.starter.RedissonAutoConfigurationV2
      - org.springframework.boot.actuate.autoconfigure.data.redis.RedisHealthContributorAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.data.redis.RedisReactiveHealthContributorAutoConfiguration

  datasource:
    # jdbc:h2 => H2 드라이버 사용
    # mem:marketlens => RAM 위에 marketlens라는 이름의 DB 생성
    # DB_CLOSE_DELAY=-1 => 마지막 커넥션이 끊겨도 DB를 유지 (기본은 커넥션 없으면 바로 삭제됨)
    # DB_CLOSE_ON_EXIT=FALSE => 기본값(TRUE)이면 JVM 종료 시 H2가 스스로 DB를 먼저 닫아버림
    #                           그 뒤 Hibernate가 DROP TABLE 실행하려고 보면 DB가 이미 없어서 에러 로그 발생
    #                           FALSE로 설정 시 H2가 먼저 닫히지 않아 Hibernate의 DROP TABLE이 정상 실행된 뒤 종료
    #
    url: jdbc:h2:mem:marketlens;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=USER
    driver-class-name: org.h2.Driver
    username: sa # ORACLE의 sys, MySQL 의 root 와 같은 개념, System Administrator 의 약자
    password:

  h2:
    console:
      enabled: true   # http://localhost:{port}/h2-console 접속 가능

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true  # Hibernate 테이블 생성 후 data.sql 실행

