# =====================================================
# 운영 서버 환경 설정 (application-real.yml)
# =====================================================
# 실행 방법 (jar):
#   java -jar app.jar --spring.profiles.active=real --server.port=8080
#
# Redis Cluster 구성 (Master 3대 + Slave 3대):
#   192.168.87.128:7001 ~ 192.168.87.134:7006
#   비밀번호: seven
# =====================================================

server:
  port: 7777

spring:
  redis:
    redisson:
      file: classpath:redisson.yml  # Redisson 상세 설정 파일 경로 (클러스터 노드 목록 등)

  cache:
    type: redis  # Redis 캐시 활성화

  data:
    redis:
      password: seven
      cluster:
        nodes:  # Redis Cluster 노드 목록 (IP 변경 시 redisson.yml 도 함께 수정)
          - 192.168.87.128:7001
          - 192.168.87.130:7002
          - 192.168.87.131:7003
          - 192.168.87.132:7004
          - 192.168.87.133:7005
          - 192.168.87.134:7006
        max-redirects: 5      # 클러스터에서 요청을 다른 노드로 리다이렉트할 최대 횟수
      connect-timeout: 3000   # Redis 연결 타임아웃 (ms)

  kafka:
    bootstrap-servers: 192.168.87.135:9092,192.168.87.136:9092,192.168.87.137:9092
