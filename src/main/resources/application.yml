  datasource:
    # mac
    # driver-class-name: oracle.jdbc.OracleDriver
    # url: jdbc:oracle:thin:@localhost:1521:XE
    # username: seven
    # password: seven

    # window
#    driver-class-name: oracle.jdbc.OracleDriver
#    url: jdbc:oracle:thin:@localhost:1521:orcl
#    username: SEVEN
#    password: SEVEN

    # vmware oracle 19.3c
    driver-class-name: oracle.jdbc.OracleDriver
    url: jdbc:oracle:thin:@192.168.87.129:1521/ORCLPDB1
    username: SEVEN
    password: SEVEN

    # 기본 커넥션풀 설정
    hikari:
      maximum-pool-size: 10        # 동시에 연결 유지할 커넥션 수
      minimum-idle: 5              # 유휴 커넥션 최소 유지 수
      connection-timeout: 30000    # 커넥션 대기 최대 시간 (ms)
      idle-timeout: 600000         # 유휴 상태 유지 시간 (ms)
      max-lifetime: 1800000        # 커넥션 최대 수명 (ms)

  jpa:
    properties:
      hibernate:
        show_sql: true
        format_sql: true

  kafka:
    bootstrap-servers: localhost:9092  # 기본값 (카프카 초기 접속 브로커 주소)
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer  # 메시지 키를 byte[] 로 직렬화
      value-serializer: org.apache.kafka.common.serialization.StringSerializer # 메시지 값을 byte[] 로 직렬화, JSON 전송 시 문자열로 변환후 전송
      acks: all          # 모든 replica에 기록 후 확인 (데이터 유실 방지), ISR 전체 복제 확인 후 ack, 가장 안전하지만 느림
      retries: 3         # 전송 실패 시 재시도 횟수
    consumer:
      group-id: waiting-queue-group # 같은 그룹 내 컨슈머들은 파티션을 분담해서 소비 
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer # byte[] -> String 역직렬화
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer # byte[] -> String 역직렬화
      auto-offset-reset: earliest   # 새 컨슈머 그룹은 가장 오래된 메시지부터 읽음
      enable-auto-commit: false     # 수동 commit (처리 완료 후 명시적으로 commit) 

# 커스텀 Kafka 토픽 이름 (KafkaConfig.java 에서 @Value 로 주입)
kafka:
  topic:
    waiting-queue: kafka-waiting-queue    # 대기열 → 입장 허용 유저를 전달하는 토픽

# 주소 DB 설정
address:
  db:
    path:
  service:
    url:
    confirm-key:

# 대기열 설정
queue:
  capacity: 2              # 동시 입장 허용 최대 인원
  batch-size: 10           # 스케줄러 1회 최대 처리 인원 (capacity 보다 크게 설정할 필요 없음)
  active-ttl-minutes: 10   # 입장 후 최대 체류 시간 (분) — 이 시간이 지나면 강제 퇴장 처리