      connect-timeout: 3000

  kafka:
    bootstrap-servers: 192.168.87.135:9092,192.168.87.136:9092,192.168.87.137:9092

  datasource:
    driver-class-name: oracle.jdbc.OracleDriver
    url: jdbc:oracle:thin:@192.168.87.129:1521/ORCLPDB1
