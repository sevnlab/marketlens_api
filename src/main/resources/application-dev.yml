spring:
  redis:
    redisson:
      file: classpath:redisson.yml

  cache:
    type: redis

  data:
    redis:
      password: seven
      cluster:
        nodes:
          - 192.168.87.128:7001
          - 192.168.87.130:7002
          - 192.168.87.131:7003
          - 192.168.87.132:7004
          - 192.168.87.133:7005
          - 192.168.87.134:7006
